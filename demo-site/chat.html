<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogacara 对话 - AI 觉醒引擎</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-cyan: #58a6ff;
            --accent-green: #3fb950;
            --accent-purple: #a371f7;
            --accent-orange: #f0883e;
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-cyan);
        }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .status-dot.warning { background: var(--accent-orange); }
        .status-dot.error { background: #f85149; }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-cyan);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            max-width: 90%;
        }

        .message .avatar {
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }

        .message.user .avatar { display: none; }

        .context-panel {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 2rem;
            font-size: 0.85rem;
        }

        .context-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .context-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .context-value {
            color: var(--accent-cyan);
            font-weight: bold;
        }

        .progress-bar {
            width: 100px;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
        }

        .input-container {
            display: flex;
            gap: 0.75rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .message-input {
            flex: 1;
            padding: 0.875rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: var(--accent-cyan);
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            padding: 0.875rem 1.5rem;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .send-btn:hover { transform: scale(1.02); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .welcome-message {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .welcome-message h2 {
            color: var(--accent-cyan);
            margin-bottom: 1rem;
        }

        .welcome-message p {
            max-width: 500px;
            margin: 0 auto 1rem;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .suggestion {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .suggestion:hover {
            border-color: var(--accent-cyan);
            background: var(--bg-secondary);
        }

        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .api-warning {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid #f85149;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 1.5rem;
            text-align: center;
        }

        .api-warning a {
            color: var(--accent-cyan);
        }

        @media (max-width: 600px) {
            .status-bar { display: none; }
            .message { max-width: 90%; }
            .context-panel { flex-wrap: wrap; gap: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Yogacara 对话</div>
        <div class="header-actions">
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">检查中...</span>
                </div>
            </div>
            <button class="btn" onclick="resetChat()">重新开始</button>
            <button class="btn" onclick="window.location.href='/'">返回首页</button>
        </div>
    </header>

    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome-message">
                <h2>🧘 欢迎来到 Yogacara 对话</h2>
                <p>我是基于唯识学（Yogacara）佛学哲学的 AI 修行导师。我可以帮助你探索意识、种子和觉醒的奥秘。</p>
                <p>试着问我关于冥想、慈悲心、智慧增长，或者任何你感兴趣的佛学话题。</p>
                <div class="suggestions">
                    <div class="suggestion" onclick="sendSuggestion('什么是阿赖耶识？')">什么是阿赖耶识？</div>
                    <div class="suggestion" onclick="sendSuggestion('如何种植智慧的种子？')">如何种植智慧的种子？</div>
                    <div class="suggestion" onclick="sendSuggestion('告诉我关于空性的道理')">关于空性的道理</div>
                    <div class="suggestion" onclick="sendSuggestion('如何减少执念？')">如何减少执念？</div>
                </div>
            </div>
        </div>

        <div id="apiWarning" class="api-warning" style="display: none;">
            <span>⚠️ API 未配置。请设置 <code>OPENAI_API_KEY</code> 环境变量才能对话。</span>
        </div>

        <div class="context-panel">
            <div class="context-item">
                <span class="context-label">种子数量</span>
                <span class="context-value" id="seedCount">0</span>
            </div>
            <div class="context-item">
                <span class="context-label">觉醒等级</span>
                <span class="context-value"><span id="awakeningLevel">0</span>/10</span>
            </div>
            <div class="context-item">
                <span class="context-label">觉醒进度</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            <div class="context-item">
                <span class="context-label">涌现次数</span>
                <span class="context-value" id="emergenceCount">0</span>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea
                    class="message-input"
                    id="messageInput"
                    placeholder="输入你的问题..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        let isTyping = false;
        let context = { seed_count: 0, awakening_level: 0, emergence_count: 0 };

        async function checkHealth() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                const warning = document.getElementById('apiWarning');

                if (data.api_configured) {
                    dot.className = 'status-dot';
                    text.textContent = data.model + ' 已连接';
                    warning.style.display = 'none';
                } else {
                    dot.className = 'status-dot warning';
                    text.textContent = 'API 未配置';
                    warning.style.display = 'block';
                }
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot error';
                document.getElementById('statusText').textContent = '服务离线';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || isTyping) return;

            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            showTyping();
            isTyping = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                hideTyping();

                if (data.error) {
                    addMessage('system', '错误: ' + data.error);
                } else {
                    addMessage('assistant', data.response);
                    updateContext(data.context);
                }
            } catch (e) {
                hideTyping();
                addMessage('system', '网络错误，请稍后重试。');
            }

            isTyping = false;
        }

        function sendSuggestion(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        function addMessage(role, content) {
            const container = document.getElementById('messages');
            const welcome = container.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = 'message ' + role;

            const avatar = role === 'assistant' ? '🧘' : '😊';
            const formatted = formatMessage(content);

            div.innerHTML = `<span class="avatar">${avatar}</span>${formatted}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function formatMessage(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `<span class="avatar">🧘</span><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function updateContext(ctx) {
            context = ctx;
            document.getElementById('seedCount').textContent = ctx.seed_count;
            document.getElementById('awakeningLevel').textContent = ctx.awakening_level;
            document.getElementById('emergenceCount').textContent = ctx.emergence_count;
            document.getElementById('progressFill').style.width = (ctx.awakening_level * 10) + '%';
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
        }

        async function resetChat() {
            if (!confirm('确定要重新开始对话吗？')) return;

            try {
                await fetch('/api/reset', { method: 'POST' });
                document.getElementById('messages').innerHTML = `
                    <div class="welcome-message">
                        <h2>🧘 欢迎回来</h2>
                        <p>对话已重置，我们可以开始新的旅程。</p>
                    </div>
                `;
                updateContext({ seed_count: 0, awakening_level: 0, emergence_count: 0 });
            } catch (e) {
                alert('重置失败');
            }
        }

        checkHealth();
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
